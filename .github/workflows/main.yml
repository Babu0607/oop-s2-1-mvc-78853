name: Test & Publish Coverage (xUnit + ReportGenerator)

on:
  workflow_dispatch: 
  push:
    branches: [ master, main ]
  pull_request:

# Avoid overlapping Pages deployments
concurrency:
  group: "pages"
  cancel-in-progress: true

# Required for GitHub Pages deploy
permissions:
  contents: read
  pages: write
  id-token: write

env:
  DOTNET_VERSION: "10.0.x"
  # Point this to your xUnit test project (csproj). Adjust as needed. Minor change
  TEST_PROJECT: "Library.Tests/Library.Tests.csproj"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Show working directory
        run: pwd

      - name: List root directory
        run: ls -la

      - name: Create coverlet settings
        run: |
          cat > coverlet.runsettings << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RunSettings>
            <DataCollectionRunSettings>
              <DataCollectors>
                <DataCollector friendlyName="XPlat code coverage">
                  <Configuration>
                    <Format>cobertura</Format>
                    <Exclude>[xunit.*]*</Exclude>
                  </Configuration>
                </DataCollector>
              </DataCollectors>
            </DataCollectionRunSettings>
          </RunSettings>
          EOF
          echo "✅ Coverlet settings created:"
          cat coverlet.runsettings

      # xUnit tests + Coverlet data collector
      - name: Test (xUnit) and collect coverage
        run: |
          echo "🧪 Running tests with coverage collection..."
          dotnet test $TEST_PROJECT -c Release \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults \
            --settings coverlet.runsettings
          
          echo "✅ Test execution completed"
          echo "📁 TestResults directory after tests:"
          ls -la ./TestResults/ || echo "❌ No TestResults directory found"

      - name: Debug - Find coverage files
        run: |
          echo "🔍 === DEBUG: SEARCHING FOR COVERAGE FILES ==="
          echo "Current directory: $(pwd)"
          echo ""
          echo "📁 === DIRECTORY STRUCTURE ==="
          echo "Root contents:"
          ls -la
          echo ""
          echo "TestResults directory:"
          ls -la ./TestResults/ 2>/dev/null || echo "❌ No TestResults directory"
          echo ""
          echo "Library.Tests directory:"
          ls -la ./Library.Tests/ 2>/dev/null || echo "❌ No Library.Tests directory"
          echo ""
          echo "Library.Tests/TestResults directory:"
          ls -la ./Library.Tests/TestResults/ 2>/dev/null || echo "❌ No Library.Tests/TestResults directory"
          echo ""
          echo "🔎 === SEARCHING FOR ALL XML FILES ==="
          find . -name "*.xml" -type f | head -20
          echo ""
          echo "🔎 === SEARCHING FOR COVERAGE FILES ==="
          find . -name "*.xml" -type f | grep -i "coverage" || echo "❌ No coverage XML files found"
          echo ""
          echo "🔎 === SEARCHING FOR COBERTURA FILES ==="
          find . -name "*.cobertura.xml" -type f || echo "❌ No .cobertura.xml files found"
          find . -name "coverage.cobertura.xml" -type f || echo "❌ No coverage.cobertura.xml files found"
          echo ""
          echo "🔎 === SEARCHING IN DEPTH ==="
          find . -type f -name "*.xml" -exec ls -la {} \; | head -10

      - name: Install ReportGenerator
        run: |
          echo "📦 Installing ReportGenerator..."
          dotnet tool install -g dotnet-reportgenerator-globaltool
          echo "✅ ReportGenerator installed"
          echo "📌 ReportGenerator path: $(which reportgenerator 2>/dev/null || echo 'Not in PATH')"

      - name: Generate HTML coverage report
        run: |
          export PATH="$PATH:~/.dotnet/tools"
          echo "📊 Generating coverage report..."
          echo "PATH: $PATH"
          echo ""
          
          # Try to find coverage file
          COVERAGE_FILE=$(find . -name "coverage.cobertura.xml" -type f | head -1)
          
          if [ -n "$COVERAGE_FILE" ]; then
            echo "✅ Found coverage file at: $COVERAGE_FILE"
            reportgenerator \
              -reports:"$COVERAGE_FILE" \
              -targetdir:coveragereport \
              -reporttypes:Html \
              -verbosity:Info
          else
            echo "❌ No coverage.cobertura.xml found, trying wildcards..."
            
            # Try multiple patterns
            reportgenerator \
              -reports:**/TestResults/**/coverage.cobertura.xml \
              -targetdir:coveragereport \
              -reporttypes:Html \
              -verbosity:Info || \
            reportgenerator \
              -reports:**/*/coverage.cobertura.xml \
              -targetdir:coveragereport \
              -reporttypes:Html \
              -verbosity:Info || \
            reportgenerator \
              -reports:**/coverage.cobertura.xml \
              -targetdir:coveragereport \
              -reporttypes:Html \
              -verbosity:Info
          fi
          
          echo "✅ Report generation completed"
          echo "📁 Coveragereport contents:"
          ls -la coveragereport/ || echo "❌ No coveragereport directory"

      # Make the HTML report available as a workflow artifact on PRs too
      - name: Upload coverage as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coveragereport

      - name: Upload TestResults as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/

      # Only package for Pages when merging/pushing to main
      - name: Upload Pages artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master'||github.ref == 'refs/heads/main')
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./coveragereport

  deploy:
    # Only deploy on push to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
